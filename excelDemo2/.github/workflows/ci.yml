name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: excelDemo2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Package app
        run: ./mvnw clean package -DskipTests

      - name: Build Docker image
        run: docker build -t exceldemo2:ci .

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/exceldemo2

      - name: Helm template
        run: helm template exceldemo2 helm/exceldemo2 -f helm/exceldemo2/values.yaml -f helm/exceldemo2/values-k3d.yaml > /tmp/exceldemo2-rendered.yaml